<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BierLog – Bier hinzufügen</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container navbar-inner">
      <a href="/anmelden#dashboard" class="navbar-logo">🍺 Bier<span>Log</span></a>
      <div class="navbar-links">
        <a href="/anmelden#dashboard" class="navbar-link">Dashboard</a>
        <a href="/addbier"            class="navbar-link active">+ Bier hinzufügen</a>
      </div>
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <span class="navbar-user" id="nav-user"></span>
        <button class="navbar-logout" onclick="handleLogout()">Abmelden</button>
      </div>
    </div>
  </nav>

  <main class="page">
    <div class="container" style="max-width: 640px;">

      <div class="page-header">
        <a href="/anmelden#dashboard" class="back-link">← Zurück zum Dashboard</a>
        <h1>Neues Bier eintragen</h1>
        <p>Gleicher Name? Zähler wird automatisch erhöht.</p>
      </div>

      <div id="counter-banner" class="info-banner" style="display: none;">
        <h4>🔄 Bereits vorhanden!</h4>
        <p id="counter-text"></p>
        <small>Weiterleitung zum Dashboard...</small>
      </div>

      <div class="card" style="padding: 2rem;">
        <form id="add-form" onsubmit="handleSubmit(event)">

          <div class="form-group">
            <label>Bierbezeichnung *</label>
            <input type="text" id="add-name" class="input-field" placeholder="z.B. Augustiner Helles" autofocus />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Bierstil *</label>
              <select
                id="add-style"
                class="input-field"
                style="background: rgba(69,26,3,0.7);"
                onchange="handleStyleChange()"
              ></select>
              <div id="new-style-row" class="new-style-row" style="display: none;">
                <input type="text" id="new-style-input" class="input-field" placeholder="z.B. Rauchbier" />
                <button type="button" class="btn-primary" style="padding: 0.5rem 0.9rem; white-space: nowrap;"
                        onclick="saveNewStyle()">Speichern</button>
                <button type="button" class="btn-ghost" style="padding: 0.5rem 0.75rem;"
                        onclick="cancelNewStyle()">✕</button>
              </div>
            </div>
            <div class="form-group">
              <label>Herkunft *</label>
              <input type="text" id="add-origin" class="input-field" placeholder="z.B. München, Bayern" />
            </div>
          </div>

          <div class="form-group">
            <label>Dein Rating</label>
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div class="stars" id="stars"></div>
              <span id="rating-label" style="font-weight: 700; font-size: 1.2rem; color: #f59e0b;">3/5</span>
            </div>
            <input type="hidden" id="add-rating" value="3" />
          </div>

          <div class="form-group">
            <label>Verkostungsdatum</label>
            <input type="date" id="add-date" class="input-field" style="color-scheme: dark;" />
          </div>

          <div class="form-group">
            <label>Notizen</label>
            <textarea
              id="add-notes"
              class="input-field"
              rows="3"
              style="resize: none;"
              placeholder="Geschmack, Aroma, Besonderheiten..."
            ></textarea>
          </div>

          <div id="add-error" class="alert-error" style="display: none; margin-bottom: 1rem;"></div>

          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn-primary">🍺 Speichern</button>
            <a href="/anmelden#dashboard" class="btn-ghost">Abbrechen</a>
          </div>

        </form>
      </div>
    </div>
  </main>


  <script src="/static/js/api.js"></script>
  <script>

    var rating = 3;
    var submitting = false;


    window.addEventListener('DOMContentLoaded', async function() {
      if (!Auth.isLoggedIn()) {
        window.location.href = '/anmelden#auth';
        return;
      }
      var user = Auth.current();
      if (user) {
        document.getElementById('nav-user').textContent = user.name || user.username || '';
      }
      document.getElementById('add-date').value = new Date().toISOString().split('T')[0];
      renderStars(3);
      await loadStyles();
    });


    function handleLogout() {
      Auth.logout();
      window.location.href = '/anmelden#auth';
    }


    async function loadStyles(selectedStyle) {
      try {
        var styles = await Styles.getAll();
        var selectElement = document.getElementById('add-style');
        var html = '';
        for (var i = 0; i < styles.length; i++) {
          var style = styles[i];
          var isSelected = (style === selectedStyle) ? 'selected' : '';
          html += '<option value="' + style + '" ' + isSelected + '>' + style + '</option>';
        }
        html += '<option value="__new__">+ Neuer Stil...</option>';
        selectElement.innerHTML = html;
      } catch (error) {}
    }


    function handleStyleChange() {
      var selectedValue = document.getElementById('add-style').value;
      if (selectedValue === '__new__') {
        document.getElementById('new-style-row').style.display = 'flex';
        document.getElementById('new-style-input').focus();
      } else {
        document.getElementById('new-style-row').style.display = 'none';
      }
    }


    async function saveNewStyle() {
      var styleName = document.getElementById('new-style-input').value.trim();
      if (!styleName) return;
      try {
        var result = await Styles.add(styleName);
        await loadStyles(result.name);
        document.getElementById('add-style').value = result.name;
        document.getElementById('new-style-row').style.display = 'none';
      } catch (error) {
        alert(error.message);
      }
    }


    async function cancelNewStyle() {
      document.getElementById('new-style-row').style.display = 'none';
      await loadStyles();
    }


    function renderStars(currentRating) {
      var html = '';
      for (var i = 1; i <= 5; i++) {
        var filledClass = (i <= currentRating) ? 'filled' : '';
        html += '<button type="button" class="star ' + filledClass + '"';
        html += ' onclick="setRating(' + i + ')"';
        html += ' onmouseover="hoverStars(' + i + ')"';
        html += ' onmouseout="renderStars(rating)">★</button>';
      }
      document.getElementById('stars').innerHTML = html;
      document.getElementById('rating-label').textContent = currentRating + '/5';
    }


    function setRating(newRating) {
      rating = newRating;
      document.getElementById('add-rating').value = newRating;
      renderStars(newRating);
    }


    function hoverStars(hoverRating) {
      var stars = document.querySelectorAll('#stars .star');
      for (var i = 0; i < stars.length; i++) {
        stars[i].classList.toggle('filled', i < hoverRating);
      }
      document.getElementById('rating-label').textContent = hoverRating + '/5';
    }


    async function handleSubmit(event) {
      event.preventDefault();
      if (submitting) return;
      var errorElement = document.getElementById('add-error');
      errorElement.style.display = 'none';
      var name   = document.getElementById('add-name').value.trim();
      var origin = document.getElementById('add-origin').value.trim();
      var style  = document.getElementById('add-style').value;
      var r      = parseInt(document.getElementById('add-rating').value);
      var date   = document.getElementById('add-date').value;
      var notes  = document.getElementById('add-notes').value;
      if (!name) {
        errorElement.textContent = '⚠ Name ist erforderlich.';
        errorElement.style.display = 'block';
        return;
      }
      if (!origin) {
        errorElement.textContent = '⚠ Herkunft ist erforderlich.';
        errorElement.style.display = 'block';
        return;
      }
      if (style === '__new__') {
        errorElement.textContent = '⚠ Bitte Stil speichern.';
        errorElement.style.display = 'block';
        return;
      }
      var button = document.getElementById('submit-btn');
      submitting = true;
      button.disabled = true;
      button.textContent = 'Speichern...';
      try {
        var result = await Beers.create({ name: name, origin: origin, style: style, rating: r, date: date, notes: notes });
        if (result._incremented) {
          document.getElementById('counter-text').innerHTML =
            '<strong>' + result.name + '</strong> existiert bereits. Zähler auf <strong style="color: #f59e0b">' + result.counter + '×</strong> erhöht.';
          document.getElementById('counter-banner').style.display = 'block';
          document.getElementById('add-form').style.display = 'none';
          setTimeout(function() {
            window.location.href = '/anmelden#dashboard';
          }, 2000);
        } else {
          window.location.href = '/anmelden#dashboard';
        }
      } catch (error) {
        errorElement.textContent = '⚠ ' + error.message;
        errorElement.style.display = 'block';
        submitting = false;
        button.disabled = false;
        button.textContent = '🍺 Speichern';
      }
    }

  </script>
</body>
</html>
